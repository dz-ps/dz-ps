name: 🐍 Generate Snake Animation

on:
  # Roda automaticamente a cada 12h
  schedule:
    - cron: "0 */12 * * *"
  # Permite rodar manualmente na aba "Actions"
  workflow_dispatch:
  # Roda a cada push na branch principal
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Gerar SVGs da cobrinha
        uses: Platane/snk@v3
        id: snake-gen
        with:
          github_user_name: ${{ github.repository_owner }}
          # Versão clara + versão escura (cobra verde para combinar com o tema)
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark&color_snake=#00FF9C

      - name: Publicar na branch "output"
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
